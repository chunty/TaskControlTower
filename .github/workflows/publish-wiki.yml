name: Publish Wiki

on:
  push:
    branches: [master]
    paths: ['wiki/**']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Push wiki to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
